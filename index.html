<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Classic Gazette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>The Classic Gazette</h1>
        <p class="subtitle">Est. 2024 — A Study in Simplicity</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Gallery</a>
        <a href="#">Archive</a>
    </nav>

    <main>
        <section class="gallery">
            <div class="card">
                <img src="https://picsum.photos/id/10/400/300" alt="Classic Landscape">
                <h3>The Great Outdoors</h3>
                <p>A look into the serene landscapes of the past.</p>
                <button onclick="showAlert('Nature')">Read More</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/id/20/400/300" alt="Vintage Desk">
                <h3>Modern Antiquity</h3>
                <p>Finding balance between old tools and new ideas.</p>
                <button onclick="showAlert('Design')">Read More</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Your Name. Built for the ages.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
